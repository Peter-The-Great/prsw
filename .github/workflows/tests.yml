name: Tests

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  coveralls:
    needs: test-multi-python
    runs-on: ubuntu-latest
    steps:
    - name: Coveralls Finished
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        parallel-finished: true

  test-multi-os:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macOS-latest, ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@v3

    - name: Install the project
      run: uv sync --all-extras

    - name: Test with pytest
      run: uv run pytest --color=yes -v

  test-multi-python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: 
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@v3

    - name: Install Python
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --all-extras
        uv add coveralls

    - name: Test with pytest
      run: uv run coverage run --source prsw --module pytest

    - name: Generate Coveralls LCOV report
      run: uv run coverage lcov

    - name: Coveralls Parallel
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        flag-name: run-${{ matrix.python-version }}
        path-to-lcov: ./coverage.lcov
        parallel: true

    - name: Check coverage
      run: uv run coverage report -m --fail-under=99
